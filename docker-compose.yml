services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bandsheet
      POSTGRES_USER: bandsheet
      POSTGRES_PASSWORD: bandsheet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bandsheet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/bandsheet
      DB_USER: bandsheet
      DB_PASSWORD: bandsheet
      JWT_SECRET: change-me-in-production-at-least-256-bits
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      FRONTEND_BASE_URL: http://localhost:5173
      SERVER_PORT: 8080
    ports:
      # host 8090(本機 8080 常被占用);容器間仍走 backend:8080
      - "8090:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
