services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bandsheet
      POSTGRES_USER: bandsheet
      POSTGRES_PASSWORD: bandsheet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bandsheet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/bandsheet
      DB_USER: bandsheet
      DB_PASSWORD: bandsheet
      JWT_SECRET: change-me-in-production-at-least-256-bits
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    profiles: ["full"]

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    profiles: ["full"]

volumes:
  pgdata:
