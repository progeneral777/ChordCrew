spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bandsheet}
    username: ${DB_USER:bandsheet}
    password: ${DB_PASSWORD:bandsheet}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  google:
    # 設定後即啟用 Google 登入;留空則 /api/auth/google 會回 503。見 docs/GOOGLE_LOGIN_SETUP.md
    client-id: ${GOOGLE_CLIENT_ID:}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-256bits}
    access-token-expiry-ms: 7200000    # 2 hours
    refresh-token-expiry-days: 14

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: ${SERVER_PORT:8090}
